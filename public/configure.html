<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration French Stream Public</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        p {
            color: var(--text-dim);
            margin-bottom: 2rem;
        }

        .group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        .catalogs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
            padding: 1rem;
            background: #0f172a;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .api-url-hint {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.3rem;
        }

        .install-link {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #000;
            border-radius: 0.5rem;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.8rem;
            display: none;
            border: 1px solid var(--primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>French Stream Public</h1>
        <p>Configurez vos catalogues et clés API.</p>

        <div class="group">
            <label>URL du serveur addon</label>
            <input type="text" id="apiUrl" placeholder="https://votre-addon.vercel.app">
            <div class="api-url-hint">URL où tourne le serveur Node.js (Vercel, Render, etc.)</div>
        </div>

        <div class="group">
            <label>Clé API TMDB (Obligatoire) <a href="https://www.themoviedb.org/settings/api" target="_blank"
                    style="color: var(--primary); font-size: 0.8rem; margin-left: 5px;">[Obtenir une clé]</a></label>
            <input type="text" id="tmdb" placeholder="Votre clé API TMDB" required>
        </div>

        <div class="checkbox-group group">
            <input type="checkbox" id="rpdb" checked>
            <label for="rpdb">Activer les notes RPDB (Gratuit)</label>
        </div>

        <div class="checkbox-group group">
            <input type="checkbox" id="vfOnly">
            <label for="vfOnly">VF uniquement (exclure VOSTFR seul)</label>
        </div>

        <label>Catalogues à afficher</label>
        <div class="catalogs" id="catalogList">
            <!-- Dynamically filled -->
        </div>

        <button onclick="generateLink()">Installer sur Stremio</button>

        <div class="install-link" id="linkBox"
            style="margin-top: 1rem; color: #ef4444; border-color: #ef4444; display: none; padding: 1rem; background: #000; border-radius: 0.5rem; word-break: break-all; font-family: monospace; font-size: 0.8rem; border: 1px solid var(--primary);">
        </div>
    </div>

    <script>
        // Pré-remplir l'URL depuis le paramètre ?api= ou depuis l'origine actuelle
        (function() {
            const params = new URLSearchParams(window.location.search);
            const apiParam = params.get('api');
            const apiInput = document.getElementById('apiUrl');
            if (apiParam) {
                apiInput.value = apiParam.replace(/\/$/, '');
            } else if (!window.location.hostname.includes('github.io')) {
                apiInput.value = window.location.origin;
            }
        })();

        const catalogs = {
            'derniers-films': 'Derniers Films', 'films-action': 'Films Action', 'dernieres-series': 'Dernières Séries',
            'series-netflix': 'Séries Netflix', 'series-appletv': 'Séries Apple TV+', 'series-prime': 'Séries Prime Video',
            'series-disneyplus': 'Séries Disney+',
            'documentaires': 'Documentaires', 'horreur': 'Horreur', 'animations': 'Animations', 'aventures': 'Aventures',
            'art-martiaux': 'Arts Martiaux', 'biopics': 'Biopics', 'comedies': 'Comédies', 'espionnages': 'Espionnages',
            'familles': 'Familles', 'fantastiques': 'Fantastiques', 'policiers': 'Policiers', 'thrillers': 'Thrillers',
            'westerns': 'Westerns', 'drames': 'Drames', 'historiques': 'Historiques', 'guerres': 'Guerres',
            'romances': 'Romances', 'science-fictions': 'Science Fictions', 'spectacle': 'Spectacle'
        };

        const defaultChecked = ['derniers-films', 'films-action', 'dernieres-series', 'series-netflix', 'series-appletv', 'series-prime', 'series-disneyplus'];

        const list = document.getElementById('catalogList');
        Object.entries(catalogs).forEach(([id, name]) => {
            const div = document.createElement('div');
            div.className = 'checkbox-group';
            const checked = defaultChecked.includes(id) ? 'checked' : '';
            div.innerHTML = `<input type="checkbox" id="${id}" ${checked} value="${id}"><label for="${id}">${name}</label>`;
            list.appendChild(div);
        });

        function generateLink() {
            const apiUrl = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
            const tmdb = document.getElementById('tmdb').value.trim();
            const rpdb = document.getElementById('rpdb').checked;
            const selected = Array.from(document.querySelectorAll('#catalogList input:checked')).map(i => i.value);
            const linkBox = document.getElementById('linkBox');

            if (!apiUrl) {
                linkBox.innerText = "❌ L'URL du serveur addon est obligatoire.";
                linkBox.style.color = '#ef4444';
                linkBox.style.borderColor = '#ef4444';
                linkBox.style.display = 'block';
                return;
            }

            if (!tmdb) {
                linkBox.innerText = "❌ La clé API TMDB est obligatoire.";
                linkBox.style.color = '#ef4444';
                linkBox.style.borderColor = '#ef4444';
                linkBox.style.display = 'block';
                return;
            }

            const config = {
                t: tmdb,
                r: rpdb,
                c: selected,
                v: document.getElementById('vfOnly').checked
            };

            const configStr = btoa(JSON.stringify(config));
            const link = `stremio://${apiUrl.replace('https://', '').replace('http://', '')}/${configStr}/manifest.json`;

            linkBox.innerText = link;
            linkBox.style.color = 'var(--primary)';
            linkBox.style.borderColor = 'var(--primary)';
            linkBox.style.display = 'block';

            window.location.href = link;
        }
    </script>
</body>

</html>
